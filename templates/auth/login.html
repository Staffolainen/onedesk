<!DOCTYPE html>
<html lang="{{ g.lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · onedesk</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0d0d;
      --surface: #161616;
      --border:  #272727;
      --accent:  #4E7796;
      --accent-h:#5f8faf;
      --text:    #e8e8e8;
      --muted:   #666666;
      --danger:  #f87171;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      -webkit-font-smoothing: antialiased;
    }
    .login-box { width: 100%; max-width: 360px; padding: 20px; }
    .logo-area { text-align: center; margin-bottom: 32px; }
    h1 { font-size: 15px; font-weight: 600; color: var(--text); }
    h1 span { color: var(--accent); }
    .subtitle { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 28px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); margin-bottom: 6px; }
    .form-control {
      width: 100%; padding: 9px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text);
      font-family: inherit; font-size: 13px;
      transition: border-color 0.12s, box-shadow 0.12s;
      margin-bottom: 16px;
    }
    .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(78,119,150,0.15); }
    .btn-login {
      width: 100%; padding: 10px;
      background: var(--accent); border: none; border-radius: 7px;
      color: #fff; font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.12s;
    }
    .btn-login:hover { background: var(--accent-h); }
    .error { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); border-radius: 7px; padding: 9px 12px; font-size: 12px; color: var(--danger); margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-area">
      <div class="app-icon">◈</div>
      <h1 style="text-transform:lowercase;letter-spacing:2px;"><span>one</span>desk</h1>
      <div class="subtitle">{{ g.config.COMPANY_NAME }}</div>
    </div>

    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="error">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth_login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label class="form-label">{{ "Lösenord" if g.lang == "sv" else "Password" }}</label>
        <input type="password" name="password" class="form-control" autofocus autocomplete="current-password" placeholder="••••••••">
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:12px;color:var(--muted);cursor:pointer;">
          <input type="checkbox" name="remember" value="1" style="accent-color:var(--accent);">
          {{ "Kom ihåg mig" if g.lang == "sv" else "Remember me" }}
        </label>
        <button type="submit" class="btn-login">
          {{ "Logga in" if g.lang == "sv" else "Sign in" }} →
        </button>
      </form>
    </div>
  </div>
</body>
</html>
