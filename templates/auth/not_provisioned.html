<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Åtkomst saknas · onedesk</title>
  <style>
    :root { --bg:#111; --surface:#1c1c1c; --border:#363636; --accent:#4E7796; --text:#f0f0f0; --muted:#909090; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 48px; max-width: 440px; width: 100%; text-align: center; }
    h1 { font-size: 22px; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 14px; line-height: 1.7; margin-bottom: 0; }
    .icon { font-size: 40px; margin-bottom: 20px; }
    a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🔒</div>
    <h1>Åtkomst saknas / Access not provisioned</h1>
    <p>
      Ditt Microsoft-konto är autentiserat men har ännu inte lagts till i onedesk.<br><br>
      Your Microsoft account is authenticated but has not yet been added to onedesk.<br><br>
      Kontakta administratören för att få åtkomst.<br>
      Contact the administrator to request access.
    </p>
  </div>
</body>
</html>
